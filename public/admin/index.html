<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Premium Craft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #15120F;
    color: #EFE7D8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: #1C1814;
    border: 1px solid rgba(176,141,87,0.25);
    border-radius: 8px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #C9BFA9;
    font-size: 14px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #C9A961;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    background: #15120F;
    border: 1px solid rgba(176,141,87,0.3);
    border-radius: 4px;
    color: #EFE7D8;
    font-size: 15px;
  }
  input:focus { outline: 2px solid #C9A961; border-color: #C9A961; }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: #0E4B3A;
    border: 1px solid #16654F;
    border-radius: 4px;
    color: #EFE7D8;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #16654F; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: rgba(180, 60, 60, 0.15);
    border: 1px solid rgba(180, 60, 60, 0.4);
    color: #ffb3b3;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
</style>
</head>
<body>
  <div class="login-box">
    <h1>Premium Craft</h1>
    <p class="subtitle">Admin Dashboard</p>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <div class="error" id="errorMsg"></div>
      <button type="submit" id="loginBtn">Log In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server. Try again.';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
